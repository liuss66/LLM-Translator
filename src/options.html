<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LLM Translator Options</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="page">
      <h1>LLM Translator <span class="brand-mark">@Liuss</span></h1>
      <p>填写模型服务配置。设置保存在 Chrome 同步存储中。</p>

      <form id="settings-form">
        <section class="settings-section">
          <h2>Model config</h2>
          <div class="preset-grid">
            <label>
              Preset
              <select id="preset-select">
                <option value="">New Preset</option>
              </select>
            </label>
            <label>
              Name
              <input id="preset-name" type="text" placeholder="Work GPT / Local Qwen">
            </label>
          </div>
          <div class="preset-actions">
            <button type="button" id="save-preset" class="secondary">Save preset</button>
            <button type="button" id="delete-preset" class="secondary danger">Delete preset</button>
          </div>

          <hr class="section-divider">
          <label>
            Provider
            <select name="provider">
              <option value="openai">OpenAI-compatible</option>
              <option value="anthropic">Anthropic</option>
              <option value="llamacpp">llama.cpp server</option>
            </select>
          </label>

          <label>
            API Base URL
            <input name="apiBaseUrl" type="url" placeholder="https://api.openai.com/v1" required>
          </label>

          <label>
            API Key
            <input name="apiKey" type="password" autocomplete="off" placeholder="OpenAI/Anthropic required; llama.cpp optional">
          </label>

          <div class="model-row">
            <label class="model-field">
              Model
              <select name="textModel" class="model-select" required>
                <option value="">-- select or type --</option>
              </select>
              <input name="textModelInput" type="text" class="model-input" placeholder="gpt-4o-mini" hidden>
            </label>
            <button type="button" id="fetch-models" class="secondary" title="Fetch model list from /models endpoint">Fetch</button>
          </div>

          <label class="toggle-row">
            <input name="enableThinking" type="checkbox">
            <span class="toggle-ui" aria-hidden="true"></span>
            <span>Enable model thinking</span>
          </label>

          <div class="settings-grid">
            <label>
              Field preset
              <select name="thinkingFieldPreset">
                <option value="auto">Auto from URL/model</option>
                <option value="doubao">Doubao / VolcEngine</option>
                <option value="custom">Custom fields below</option>
              </select>
            </label>

            <label>
              Thinking effort
              <select name="thinkingEffort">
                <option value="none">none</option>
                <option value="minimal">minimal</option>
                <option value="low">low</option>
                <option value="medium">medium</option>
                <option value="high">high</option>
                <option value="xhigh">xhigh</option>
              </select>
            </label>
          </div>

          <label>
            Token budget
            <input name="thinkingBudgetTokens" type="number" min="0" max="128000" step="128" placeholder="0">
          </label>

          <label>
            Custom thinking fields
            <textarea
              name="thinkingRequestFields"
              rows="5"
              placeholder="thinking.type&#10;enable_thinking&#10;chat_template_kwargs.enable_thinking&#10;extra_body.enable_thinking&#10;extra_body.chat_template_kwargs.enable_thinking"
            ></textarea>
          </label>
          <p class="section-note">Auto 会根据 URL 和模型名自动选择最合适的字段；Custom 才使用下面的自定义字段。</p>

          <div class="section-title-row">
            <h3>Prompt</h3>
            <button type="button" id="restore-default-prompt" class="secondary">Default prompt</button>
          </div>
          <label>
            System prompt
            <textarea name="systemPrompt" rows="6"></textarea>
          </label>
        </section>

        <section class="settings-section">
          <h2>App config</h2>
          <div class="settings-grid">
            <label>
              Target language
              <select id="target-language-select">
                <option value="中文">中文</option>
                <option value="English">English</option>
                <option value="日本語">日本語</option>
                <option value="한국어">한국어</option>
                <option value="Français">Français</option>
                <option value="Deutsch">Deutsch</option>
                <option value="Español">Español</option>
                <option value="Русский">Русский</option>
                <option value="Português">Português</option>
                <option value="Italiano">Italiano</option>
                <option value="Custom">Custom</option>
              </select>
              <input id="target-language-custom" name="targetLanguage" type="text" placeholder="Custom language" hidden>
            </label>
          </div>

          <div class="toggle-grid">
            <label class="toggle-row">
              <input name="showOcrResult" type="checkbox">
              <span class="toggle-ui" aria-hidden="true"></span>
              <span>OCR text</span>
            </label>

            <label class="toggle-row">
              <input name="showInputImage" type="checkbox">
              <span class="toggle-ui" aria-hidden="true"></span>
              <span>Input image</span>
            </label>

            <label class="toggle-row">
              <input name="compressInputImage" type="checkbox">
              <span class="toggle-ui" aria-hidden="true"></span>
              <span>Compress</span>
            </label>

            <label class="toggle-row">
              <input name="cropPageMargins" type="checkbox">
              <span class="toggle-ui" aria-hidden="true"></span>
              <span>Crop</span>
            </label>
          </div>

          <div class="settings-grid compact-grid">
            <label>
              Max edge
              <input name="imageMaxEdge" type="number" min="320" max="4096" step="64" placeholder="1600">
            </label>

            <label>
              JPEG quality
              <input name="imageJpegQuality" type="number" min="0.5" max="1" step="0.01" placeholder="0.88">
            </label>
          </div>

          <hr class="section-divider">
          <h3>Config backup</h3>
          <p class="section-note">导出和导入不会包含或覆盖 API Key。</p>
          <div class="preset-actions">
            <button type="button" id="export-settings" class="secondary">Export settings</button>
            <button type="button" id="import-settings" class="secondary">Import settings</button>
            <button type="button" id="restore-defaults" class="secondary danger">Restore defaults</button>
          </div>
          <input id="import-settings-file" type="file" accept="application/json,.json" hidden>
        </section>

        <div class="actions">
          <button type="submit">Save settings</button>
          <button type="button" id="test-model" class="secondary">Test model</button>
          <button type="button" id="open-shortcuts" class="secondary">Keyboard shortcuts</button>
          <span id="status" role="status"></span>
        </div>
      </form>
    </main>
    <script src="options.js"></script>
  </body>
</html>
