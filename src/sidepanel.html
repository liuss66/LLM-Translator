<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LLM Translator Side Panel</title>
    <link rel="stylesheet" href="vendor/katex/katex.min.css">
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <main>
      <section class="config-panel">
        <div class="config-actions-row">
          <div class="primary-actions">
            <button id="translate-selection" type="button">Text</button>
            <button id="translate-region" type="button">Screenshot</button>
            <button id="translate-page" type="button">Page</button>
          </div>
          <button id="toggle-config" class="fold-button fold-button--top" type="button" aria-expanded="true" aria-controls="config-content">
            <span aria-hidden="true">⌃</span>
          </button>
        </div>

        <div id="config-content" class="config-content">
            <div class="model-language-row">
              <label class="preset-row">
                <span>Model</span>
                <select id="model-preset">
                  <option value="">New Preset</option>
                </select>
              </label>
              <label class="language-row">
                <span>Lang</span>
                <select id="target-language"></select>
              </label>
            </div>
            <div class="toggle-actions">
              <label class="toggle-row">
                <input id="show-ocr-result" type="checkbox">
                <span class="toggle-ui" aria-hidden="true"></span>
                <span>OCR</span>
              </label>
              <label class="toggle-row">
                <input id="show-input-image" type="checkbox">
                <span class="toggle-ui" aria-hidden="true"></span>
                <span>Image</span>
              </label>
              <label class="toggle-row">
                <input id="enable-thinking" type="checkbox">
                <span class="toggle-ui" aria-hidden="true"></span>
                <span>Think</span>
              </label>
            </div>
            <div class="image-settings" aria-label="Image compression settings">
              <label class="toggle-row">
                <input id="crop-page-margins" type="checkbox">
                <span class="toggle-ui" aria-hidden="true"></span>
                <span>Crop</span>
              </label>
              <label class="toggle-row">
                <input id="compress-input-image" type="checkbox">
                <span class="toggle-ui" aria-hidden="true"></span>
                <span>Compress</span>
              </label>
              <label class="compression-param">
                Edge
                <input id="image-max-edge" type="number" min="320" max="4096" step="64">
              </label>
              <label class="compression-param">
                Quality
                <input id="image-jpeg-quality" type="number" min="0.5" max="1" step="0.01">
              </label>
            </div>
        </div>
      </section>

      <section class="reply-area" aria-label="Model response">
        <section class="result" aria-live="polite">
          <div id="result-image"></div>
          <details id="result-reasoning" class="reasoning-panel" hidden>
            <summary>Thinking</summary>
            <div id="result-reasoning-content"></div>
          </details>
          <div class="translation-panel">
            <div class="panel-toolbar">
              <div class="translation-panel__label">Translation</div>
              <button id="copy-translation" class="copy-button" type="button">Copy</button>
            </div>
            <div id="result-translation"></div>
          </div>
        </section>

        <section class="chat" hidden>
          <h2>Follow-up</h2>
          <div id="chat-log"></div>
        </section>
      </section>

      <section class="answer-box" aria-label="Answer input">
        <div class="answer-toolbar">
          <button id="toggle-answer" class="fold-button fold-button--bottom" type="button" aria-expanded="true" aria-controls="answer-content">
            <span aria-hidden="true">⌄</span>
          </button>
        </div>
        <div id="answer-content" class="answer-content">
          <form id="chat-form">
            <textarea
              id="chat-input"
              rows="3"
              placeholder="Ask a question after screenshot translation"
            ></textarea>
            <div class="answer-actions">
              <button type="submit">Ask</button>
            </div>
          </form>
        </div>
        <div class="status-row">
          <p id="status" role="status"></p>
          <button id="stop-action" type="button" class="status-stop" hidden>Stop</button>
        </div>
      </section>

      <button id="open-options" class="settings-fab" type="button" aria-label="Options" title="Options">
        <span aria-hidden="true">⚙</span>
      </button>
    </main>
    <script src="vendor/katex/katex.min.js"></script>
    <script src="markdown.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
